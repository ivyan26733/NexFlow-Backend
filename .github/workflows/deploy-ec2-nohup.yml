name: Deploy backend to EC2 (no cost, nohup)

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build jar (skip tests)
        run: mvn -B package -DskipTests

      - name: Detect jar file
        id: jar
        shell: bash
        run: |
          set -e
          JAR_FILE="$(ls target/*.jar | grep -v 'original' | head -n 1)"
          echo "JAR_FILE=$JAR_FILE" >> "$GITHUB_ENV"
          echo "Using $JAR_FILE"

      - name: SCP jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 3.6.89.46
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          source: ${{ env.JAR_FILE }}
          target: /home/ec2-user/nexflow-backend.jar

      - name: Restart backend on EC2 (nohup)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.6.89.46
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/home/ec2-user"
            JAR_PATH="${APP_DIR}/nexflow-backend.jar"
            ENV_PATH="${APP_DIR}/nexflow-backend.env"
            LOG_PATH="${APP_DIR}/nexflow-backend.log"

            echo "Writing env file..."
            cat > "$ENV_PATH" <<EOF
            PGHOST='${{ secrets.PGHOST }}'
            PGPORT='${{ secrets.PGPORT }}'
            PGDATABASE='${{ secrets.PGDATABASE }}'
            PGUSER='${{ secrets.PGUSER }}'
            PGPASSWORD='${{ secrets.PGPASSWORD }}'

            CORS_ALLOWED_ORIGINS='${{ secrets.CORS_ALLOWED_ORIGINS }}'

            RABBITMQ_HOST='${{ secrets.RABBITMQ_HOST }}'
            RABBITMQ_PORT='${{ secrets.RABBITMQ_PORT }}'
            RABBITMQ_STOMP_PORT='${{ secrets.RABBITMQ_STOMP_PORT }}'
            RABBITMQ_USERNAME='${{ secrets.RABBITMQ_USERNAME }}'
            RABBITMQ_PASSWORD='${{ secrets.RABBITMQ_PASSWORD }}'
            RABBITMQ_VHOST='${{ secrets.RABBITMQ_VHOST }}'
            EOF

            echo "Stopping existing backend (best-effort)..."
            pkill -f "java -jar .*nexflow-backend.jar" || true

            echo "Starting backend with prod profile..."
            set -o allexport
            # shellcheck disable=SC1090
            source "$ENV_PATH"
            set +o allexport

            nohup java -jar "$JAR_PATH" --spring.profiles.active=prod \
              > "$LOG_PATH" 2>&1 &

            echo "Backend restarted."

