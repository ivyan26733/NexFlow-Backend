version: '3.8'

# Runs PostgreSQL + RabbitMQ only.
# The Spring Boot JAR runs directly on the host (java -jar app.jar).
# Usage:
#   cp .env.example .env    # fill in PGPASSWORD, JWT_SECRET, etc.
#   docker compose -f docker-compose.prod.yml up -d

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nexflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${PGDATABASE:-nexflow}
      POSTGRES_USER:     ${PGUSER:-nexflow}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"      # exposed so the JAR on the host can connect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-nexflow} -d ${PGDATABASE:-nexflow}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Redis (dashboard cache) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: nexflow-rabbitmq
    hostname: nexflow-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER:  ${RABBITMQ_USERNAME:-nexflow}
      RABBITMQ_DEFAULT_PASS:  ${RABBITMQ_PASSWORD:-nexflow123}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - ./rabbitmq-config/enabled_plugins:/etc/rabbitmq/enabled_plugins
      - ./rabbitmq-config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP — used by Spring AMQP
      - "61613:61613"  # STOMP — used by StompBrokerRelay (WebSocket)
      - "15672:15672"  # Management UI (optional — lock down in prod)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  rabbitmq_data:
