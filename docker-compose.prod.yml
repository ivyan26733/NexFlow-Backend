version: '3.8'

# Production docker-compose for AWS EC2.
# All secrets come from the .env file in the same directory.
# Usage:
#   cp .env.example .env   # then fill in values
#   docker compose -f docker-compose.prod.yml up -d

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nexflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-nexflow}
      POSTGRES_USER: ${PGUSER:-nexflow}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-nexflow} -d ${PGDATABASE:-nexflow}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: nexflow-rabbitmq
    hostname: nexflow-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-nexflow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-nexflow123}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - ./rabbitmq-config/enabled_plugins:/etc/rabbitmq/enabled_plugins
      - ./rabbitmq-config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Spring Boot Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexflow-backend:prod
    container_name: nexflow-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Database — points to the postgres service above
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-nexflow}
      PGUSER: ${PGUSER:-nexflow}
      PGPASSWORD: ${PGPASSWORD}
      # Disable SSL for internal docker-network postgres (no TLS cert on container)
      PGSSLMODE: disable
      # RabbitMQ — points to the rabbitmq service above
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_STOMP_PORT: 61613
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-nexflow}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-nexflow123}
      RABBITMQ_VHOST: /
      # CORS — your Vercel frontend URL (comma-separated if multiple)
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # Server port
      PORT: 8090
    ports:
      - "8090:8090"

  # ── NexFlow Agent (Node.js AI pipeline server) ───────────────────────────
  nexflow-agent:
    build:
      context: ./nexflow-assistant
      dockerfile: Dockerfile
    image: nexflow-agent:prod
    container_name: nexflow-agent
    restart: unless-stopped
    environment:
      PORT: 3001
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NEXFLOW_BACKEND_URL: http://backend:8090
      NEXFLOW_FRONTEND_URL: ${CORS_ALLOWED_ORIGINS}
      NEXFLOW_CORS_ORIGIN: ${CORS_ALLOWED_ORIGINS}

  # ── Nginx reverse proxy (optional — gives you port 80 + easy SSL later) ──
  nginx:
    image: nginx:alpine
    container_name: nexflow-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - nexflow-agent
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  rabbitmq_data:
