version: '3.8'

services:

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: nexflow-rabbitmq
    hostname: nexflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: nexflow
      RABBITMQ_DEFAULT_PASS: nexflow123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      # Mount our plugins file so STOMP is auto-enabled on every start
      - ./rabbitmq-config/enabled_plugins:/etc/rabbitmq/enabled_plugins
      # Mount our config file so STOMP port 61613 is always open
      - ./rabbitmq-config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      # Persist RabbitMQ data so queues survive restarts
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI — open localhost:15672 to debug
      - "61613:61613"  # STOMP port — used by Spring StompBrokerRelay
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexflow-backend
    depends_on:
      rabbitmq:
        condition: service_healthy   # waits for RabbitMQ to be ready
    environment:
      # RabbitMQ — uses service name "rabbitmq" as hostname inside Docker network
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_STOMP_PORT: 61613
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USERNAME: nexflow
      RABBITMQ_PASSWORD: nexflow123
      RABBITMQ_VHOST: /
      # Spring profile — uses application-prod.properties
      SPRING_PROFILES_ACTIVE: prod
      # Database — point at your PostgreSQL (RDS, docker postgres, etc.)
      PGHOST: ${PGHOST:-localhost}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-nexflow}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      PGSSLMODE: ${PGSSLMODE:-disable}
      # CORS — add your Vercel URL here
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8090:8090"    # change to match your server.port
    restart: on-failure

volumes:
  rabbitmq_data:

