upstream nexflow_backend {
    server backend:8090;
}

server {
    listen 80;
    server_name _;  # Replace with your domain or EC2 public IP

    # Increase buffer sizes for large API payloads
    client_max_body_size 10M;

    # ── Agent / Assistant API (Node.js — must come before /api/) ─
    location /api/agent/ {
        proxy_pass         http://nexflow-agent:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/assistant/ {
        proxy_pass         http://nexflow-agent:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── REST API (Spring Boot) ────────────────────────────────
    location /api/ {
        proxy_pass         http://nexflow_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── WebSocket (SockJS) ────────────────────────────────────
    location /ws {
        proxy_pass         http://nexflow_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health check endpoint (optional)
    location /actuator/health {
        proxy_pass http://nexflow_backend;
        proxy_set_header Host $host;
    }
}
