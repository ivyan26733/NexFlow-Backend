# STOMP plugin — listen on port 61613
stomp.listeners.tcp.1 = 0.0.0.0:61613

# Management UI — port 15672
management.listener.port = 15672
management.listener.ip = 0.0.0.0

# Memory — cap at 256 MB absolute (suits t2.micro / t3.micro instances)
# Alarm triggers at this threshold; publishing blocks until memory drops.
vm_memory_high_watermark.absolute = 256MiB

# Disk — warn but don't block if free disk drops below 512 MB
disk_free_limit.absolute = 512MB
