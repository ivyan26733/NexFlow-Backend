########################################
# Application (prod profile – AWS EC2 / env-based)
########################################
spring.application.name=nexflow-backend


########################################
# Database (PostgreSQL) – from environment
########################################
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=${PGSSLMODE:require}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


########################################
# JPA / Hibernate (production-safe)
########################################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

########################################
# Local-dev flag (always false on prod)
########################################
app.local-dev=false

########################################
# Actuator (health-only, no sensitive exposure)
########################################
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never


########################################
# Server – port from environment (e.g. EC2)
########################################
server.port=${PORT:8090}


########################################
# CORS – allowed origins for frontend + agent UIs
########################################
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://nex-flow-frontend.vercel.app,http://localhost:3001,http://localhost:3000}


########################################
# Redis – disabled (project uses RabbitMQ)
########################################
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration


########################################
# RabbitMQ – Spring AMQP (health checks, producers/consumers)
########################################
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_AMQP_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}


########################################
# RabbitMQ – StompBrokerRelay (WebSocket message broker)
# STOMP uses a different port (61613) than AMQP (5672).
########################################
rabbitmq.host=${RABBITMQ_HOST:localhost}
rabbitmq.port=${RABBITMQ_STOMP_PORT:61613}
rabbitmq.username=${RABBITMQ_USERNAME:guest}
rabbitmq.password=${RABBITMQ_PASSWORD:guest}
rabbitmq.virtual-host=${RABBITMQ_VHOST:/}


########################################
# HikariCP (production pool)
########################################
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=NexflowHikariPool
spring.datasource.hikari.leak-detection-threshold=60000


########################################
# Logging
########################################
logging.level.com.nexflow=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=warn


########################################
# Auth / JWT
########################################
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-ms=${JWT_EXPIRY_MS:604800000}
app.frontend.url=${FRONTEND_URL:https://nex-flow-frontend.vercel.app}

########################################
# Google OAuth2 (optional)
########################################
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

########################################
# Email / SMTP (optional — leave SMTP_HOST unset to disable)
########################################
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true