# Application
spring.application.name=nexflow-backend

# In production (Railway): reads PGHOST, PGPORT, PGDATABASE env vars
# In local development: falls back to localhost:5432/nexflow
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:nexflow}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Redis off by default so local works without Redis. For production: set SPRING_AUTOCONFIGURE_EXCLUDE= (empty) and REDIS_URL.
spring.autoconfigure.exclude=${SPRING_AUTOCONFIGURE_EXCLUDE:org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration}

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Server — Railway sets PORT; fallback 8080 for local
server.port=${PORT:8090}

# Logging
logging.level.com.nexflow=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.core.env=DEBUG

# CORS — allow Vercel/frontend + agent via CORS_ALLOWED_ORIGINS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# RabbitMQ for StompBrokerRelay (multi-instance WebSocket fix)
rabbitmq.host=${RABBITMQ_HOST:}
rabbitmq.port=${RABBITMQ_STOMP_PORT:61613}
rabbitmq.username=${RABBITMQ_USERNAME:nexflow}
rabbitmq.password=${RABBITMQ_PASSWORD:nexflow123}
rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# Standard Spring AMQP (Actuator health check / metrics)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_AMQP_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:nexflow}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:nexflow123}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# HikariCP connection pool — sized for concurrent flow execution
# With flowExecutionExecutor maxPoolSize=50: ~30 DB connections is a good balance
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=NexflowHikariPool

# Optional: log potential connection leaks during load tests
spring.datasource.hikari.leak-detection-threshold=60000

# ── Auth / JWT ─────────────────────────────────────────────────────────────────
# Local fallback secret — acceptable for dev only. On prod this MUST come from JWT_SECRET env var.
app.jwt.secret=${JWT_SECRET:nexflow-local-dev-secret-key-32chars!!}
app.jwt.expiry-ms=${JWT_EXPIRY_MS:604800000}
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ── Local-dev flag ─────────────────────────────────────────────────────────────
# true  → OTP printed to terminal, token returned in response body (no HttpOnly cookie)
# false → OTP sent via SMTP only, token delivered as HttpOnly cookie (production mode)
app.local-dev=false

# ── Actuator (minimal public exposure) ────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Google OAuth2 (optional — set GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET to enable) ──
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ── Email / SMTP (optional — leave SMTP_HOST unset to disable, set it to enable OTP emails) ──
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
